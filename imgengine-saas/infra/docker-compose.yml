# infra/docker-compose.yaml
services:


  api:
    build: ../backend/api-service
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data
    depends_on:
      - redis
      - db

  worker:
    build:
      context: ..
      dockerfile: backend/worker-service/Dockerfile

    command: uv run celery -A tasks worker --loglevel=info
    volumes:
      - ../data:/data
    depends_on:
      - redis
      - db

  redis:
    image: redis:7

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: imgengine
      POSTGRES_PASSWORD: imgengine
      POSTGRES_DB: imgengine

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    volumes:
      - ../data/logs:/data/logs
      - ./observability/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    
  prometheus:
    image: prom/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: jaeger
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP (your current exporter uses this)
    environment:
      - COLLECTOR_OTLP_ENABLED=true