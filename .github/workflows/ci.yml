- name: Check File Headers
  run: python3 scripts/check_headers.py

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: sudo apt-get install -y build-essential cmake python3

      # 🔥 LINT FIRST (FAST FAIL)
      - name: Check File Headers
        run: python3 scripts/check_headers.py

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Run Tests
        run: ./tests/run_all.sh