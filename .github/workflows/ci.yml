name: imgengine-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3

      # 🔥 HEADER LINT (FAIL FAST)
      - name: Check File Headers
        run: python3 scripts/check_headers.py

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Run Tests
        run: |
          if [ -f ./tests/run_all.sh ]; then
            ./tests/run_all.sh
          else
            echo "No tests found, skipping"
          fi